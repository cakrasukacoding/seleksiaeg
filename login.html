<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AEG Clan — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1); }

    [data-theme="dark"] {
      --bg: #080808; --bg2: #0f0f0f;
      --surface: rgba(255,255,255,0.04); --surface2: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.12); --border-h: rgba(255,255,255,0.35);
      --text: #f0f0f0; --text-sub: rgba(240,240,240,0.5); --text-dim: rgba(240,240,240,0.25);
      --glow: rgba(255,255,255,0.08); --glow-h: rgba(255,255,255,0.18);
      --input-bg: rgba(255,255,255,0.04); --popup-bg: #111;
    }
    [data-theme="light"] {
      --bg: #f5f5f5; --bg2: #ebebeb;
      --surface: rgba(0,0,0,0.04); --surface2: rgba(0,0,0,0.08);
      --border: rgba(0,0,0,0.12); --border-h: rgba(0,0,0,0.4);
      --text: #0a0a0a; --text-sub: rgba(10,10,10,0.5); --text-dim: rgba(10,10,10,0.3);
      --glow: rgba(0,0,0,0.05); --glow-h: rgba(0,0,0,0.12);
      --input-bg: rgba(0,0,0,0.04); --popup-bg: #fff;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #bg-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ── LOGIN CARD ── */
    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: clamp(1.5rem, 5vw, 2.5rem);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2.5rem 2rem;
      position: relative;
    }

    /* Corner decorations */
    .corner-deco {
      position: absolute; width: 14px; height: 14px;
      border-color: var(--border-h); border-style: solid; pointer-events: none;
    }
    .corner-deco.tl { top: 0; left: 0; border-width: 1px 0 0 1px; }
    .corner-deco.tr { top: 0; right: 0; border-width: 1px 1px 0 0; }
    .corner-deco.bl { bottom: 0; left: 0; border-width: 0 0 1px 1px; }
    .corner-deco.br { bottom: 0; right: 0; border-width: 0 1px 1px 0; }

    .login-logo {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: 0.12em;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .login-logo span { opacity: 0.45; }

    .login-subtitle {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2rem;
    }

    .form-group {
      display: flex; flex-direction: column; gap: 0.45rem;
      margin-bottom: 1.1rem;
    }

    .form-label {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-dim);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap i {
      position: absolute;
      left: 0.9rem; top: 50%; transform: translateY(-50%);
      font-size: 0.75rem; color: var(--text-dim);
      pointer-events: none;
    }

    .cyber-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.85rem 1rem 0.85rem 2.4rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }
    .cyber-input::placeholder { color: var(--text-dim); }
    .cyber-input:focus {
      border-color: var(--border-h);
      background: var(--surface2);
      box-shadow: 0 0 0 3px var(--glow);
    }

    /* Toggle password visibility */
    .toggle-pw {
      position: absolute;
      right: 0.9rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-dim); font-size: 0.75rem;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--text); }

    /* Status message */
    .status-msg {
      font-size: 0.78rem;
      color: var(--text-dim);
      text-align: center;
      min-height: 1.2em;
      margin-bottom: 0.75rem;
      transition: color 0.3s;
    }
    .status-msg.error { color: #ff5f5f; }
    .status-msg.pending { color: var(--text-sub); }
    .status-msg.success { color: #5fff8a; }

    .btn-submit {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--bg); background: var(--text);
      border: none; padding: 1rem 2rem;
      cursor: pointer; border-radius: 4px;
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      transition: opacity 0.25s, transform 0.25s;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.8; transform: translateY(-2px); }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner {
      width: 14px; height: 14px;
      border: 1.5px solid var(--bg);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link {
      display: block; text-align: center;
      margin-top: 1.5rem;
      font-size: 0.72rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    /* Pending approval screen */
    #pending-screen {
      display: none;
      text-align: center;
      padding: 1rem 0;
    }
    .pending-icon {
      font-size: 2.5rem;
      color: var(--text-sub);
      margin-bottom: 1rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:0.6 } 50% { opacity:1 } }
    .pending-title {
      font-family: 'Sora', sans-serif;
      font-size: 1rem; font-weight: 700;
      color: var(--text); margin-bottom: 0.5rem;
    }
    .pending-sub {
      font-size: 0.8rem; color: var(--text-sub);
      line-height: 1.6; max-width: 280px; margin: 0 auto 1.5rem;
    }
    .btn-outline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text); background: transparent;
      border: 1px solid var(--border); padding: 0.7rem 1.5rem;
      cursor: pointer; border-radius: 3px;
      transition: border-color 0.25s, background 0.25s;
    }
    .btn-outline:hover { border-color: var(--border-h); background: var(--surface2); }

    /* Fade in */
    .login-card {
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: none; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="login-wrap">
    <div class="login-card">
      <div class="corner-deco tl"></div>
      <div class="corner-deco tr"></div>
      <div class="corner-deco bl"></div>
      <div class="corner-deco br"></div>

      <!-- LOGIN FORM -->
      <div id="login-screen">
        <div class="login-logo">AEG<span> /ADMIN</span></div>
        <div class="login-subtitle">Restricted Access — Verify Identity</div>

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrap">
            <i class="fa-solid fa-user"></i>
            <input class="cyber-input" id="username" type="text" placeholder="Admin username" autocomplete="off" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input class="cyber-input" id="password" type="password" placeholder="Admin password" autocomplete="off" />
            <button class="toggle-pw" type="button" onclick="togglePw()" tabindex="-1">
              <i class="fa-solid fa-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <div class="status-msg" id="status-msg"></div>

        <button class="btn-submit" id="login-btn" type="button" onclick="requestLogin()">
          <i class="fa-solid fa-arrow-right"></i>
          Request Access
        </button>

        <a href="index.html" class="back-link">
          <i class="fa-solid fa-chevron-left" style="font-size:0.6rem;margin-right:0.3rem;"></i>
          Back to Home
        </a>
      </div>

      <!-- PENDING APPROVAL SCREEN -->
      <div id="pending-screen">
        <div class="pending-icon">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <div class="pending-title">Waiting for Approval</div>
        <div class="pending-sub">
          A verification request has been sent to the AEG admin via Telegram.
          Please wait for approval.
        </div>
        <button class="btn-outline" onclick="checkApproval()">
          <i class="fa-solid fa-rotate" style="margin-right:0.4rem;"></i>
          Check Status
        </button>
        <a href="login.html" class="back-link" style="margin-top:1rem;">Cancel & Go Back</a>
      </div>
    </div>
  </div>

  <script>
    /* ── CANVAS PARTICLES (same as main site) ── */
    const canvas = document.getElementById('bg-canvas')
    const ctx = canvas.getContext('2d')
    let W, H, pts = []

    function resize() {
      W = canvas.width = window.innerWidth
      H = canvas.height = window.innerHeight
    }
    resize()
    window.addEventListener('resize', resize)

    function initPts() {
      pts = []
      const n = Math.floor((W * H) / 18000)
      for (let i = 0; i < n; i++) {
        pts.push({
          x: Math.random() * W, y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          r: Math.random() * 1.2 + 0.4
        })
      }
    }
    initPts()

    function draw() {
      ctx.clearRect(0, 0, W, H)
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark'
      const clr = isDark ? 'rgba(255,255,255,' : 'rgba(0,0,0,'
      pts.forEach(p => {
        p.x += p.vx; p.y += p.vy
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0
        ctx.beginPath()
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2)
        ctx.fillStyle = clr + '0.35)'
        ctx.fill()
      })
      pts.forEach((a, i) => {
        for (let j = i + 1; j < pts.length; j++) {
          const b = pts[j]
          const d = Math.hypot(a.x - b.x, a.y - b.y)
          if (d < 100) {
            ctx.beginPath()
            ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y)
            ctx.strokeStyle = clr + (0.06 * (1 - d / 100)) + ')'
            ctx.lineWidth = 0.5
            ctx.stroke()
          }
        }
      })
      requestAnimationFrame(draw)
    }
    draw()

    /* ── PASSWORD TOGGLE ── */
    function togglePw() {
      const inp = document.getElementById('password')
      const icon = document.getElementById('eye-icon')
      if (inp.type === 'password') {
        inp.type = 'text'
        icon.className = 'fa-solid fa-eye-slash'
      } else {
        inp.type = 'password'
        icon.className = 'fa-solid fa-eye'
      }
    }

    /* ── LOGIN REQUEST ── */
    let sessionToken = null

    async function requestLogin() {
      const username = document.getElementById('username').value.trim()
      const password = document.getElementById('password').value.trim()
      const status = document.getElementById('status-msg')
      const btn = document.getElementById('login-btn')

      if (!username || !password) {
        status.className = 'status-msg error'
        status.textContent = 'Username dan password wajib diisi.'
        return
      }

      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span> Sending...'
      status.className = 'status-msg pending'
      status.textContent = 'Mengirim permintaan...'

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        })
        const data = await res.json()

        if (data.success) {
          sessionToken = data.token
          // Switch to pending screen
          document.getElementById('login-screen').style.display = 'none'
          document.getElementById('pending-screen').style.display = 'block'
        } else {
          status.className = 'status-msg error'
          status.textContent = data.error || 'Gagal mengirim permintaan.'
        }
      } catch (e) {
        status.className = 'status-msg error'
        status.textContent = 'Network error. Coba lagi.'
      } finally {
        btn.disabled = false
        btn.innerHTML = '<i class="fa-solid fa-arrow-right"></i> Request Access'
      }
    }

    /* ── CHECK APPROVAL ── */
    async function checkApproval() {
      if (!sessionToken) return
      const btn = document.querySelector('#pending-screen .btn-outline')
      btn.disabled = true
      btn.innerHTML = '<i class="fa-solid fa-rotate fa-spin" style="margin-right:0.4rem;"></i> Checking...'

      try {
        const res = await fetch('/api/check-approval', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: sessionToken })
        })
        const data = await res.json()

        if (data.approved) {
          // Save session and redirect
          sessionStorage.setItem('aeg_admin_token', sessionToken)
          window.location.href = 'admin.html'
        } else if (data.denied) {
          document.getElementById('pending-screen').style.display = 'none'
          document.getElementById('login-screen').style.display = 'block'
          const status = document.getElementById('status-msg')
          status.className = 'status-msg error'
          status.textContent = 'Akses ditolak oleh admin.'
          sessionToken = null
        } else {
          // Still pending
          btn.disabled = false
          btn.innerHTML = '<i class="fa-solid fa-rotate" style="margin-right:0.4rem;"></i> Check Status'
          alert('Masih menunggu persetujuan admin.')
        }
      } catch (e) {
        btn.disabled = false
        btn.innerHTML = '<i class="fa-solid fa-rotate" style="margin-right:0.4rem;"></i> Check Status'
      }
    }

    /* ── ENTER KEY ── */
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') requestLogin()
    })
  </script>
</body>
</html>
